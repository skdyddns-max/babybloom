<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif; }
  .bg { width:1080px; height:1920px; position:relative; overflow:hidden;
        background:linear-gradient(170deg,#FEF7ED 0%,#FBE9D2 55%,#F6D9B8 100%); }
  .motif { position:absolute; top:180px; left:0; right:0; text-align:center; }
  .ghost { position:absolute; top:60px; left:0; right:0; text-align:center;
           font-size:54px; font-weight:800; color:rgba(180,130,80,.35); letter-spacing:2px; }
  .big-emoji { font-size:430px; line-height:1; filter:drop-shadow(0 30px 60px rgba(180,120,60,.25)); }
  /* 2: 카톡 말풍선 */
  .bub { width:760px; margin:0 auto 34px; background:#FEE500; border-radius:44px 44px 44px 10px;
         padding:46px 54px; font-size:44px; font-weight:700; color:#3A2929; text-align:left;
         box-shadow:0 14px 34px rgba(120,90,30,.18); }
  .bub.r { border-radius:44px 44px 10px 44px; background:#fff; margin-left:200px; width:640px; }
  /* 3: AI 채팅 */
  .dark { background:linear-gradient(170deg,#2B2620 0%,#4A3B2C 60%,#6B4F33 100%); }
  .ai-row { display:flex; align-items:center; gap:30px; justify-content:center; margin-top:60px; }
  .ai-orb { width:220px; height:220px; border-radius:50%;
            background:radial-gradient(circle at 35% 30%,#FFB37E,#E8590C 70%);
            box-shadow:0 0 120px rgba(232,120,40,.65); }
  .ai-input { width:820px; margin:70px auto 0; background:rgba(255,255,255,.12);
              border:2px solid rgba(255,255,255,.3); border-radius:32px; padding:44px 50px;
              font-size:42px; font-weight:600; color:#fff; text-align:left; }
  .cursor { display:inline-block; width:5px; height:48px; background:#FFCBA6; vertical-align:middle; margin-left:8px; }
  /* 4: 코드 몽타주 */
  .codeline { width:760px; margin:0 auto 26px; height:34px; border-radius:17px;
              background:rgba(140,95,50,.18); }
  .codeline.s { width:560px; } .codeline.l { width:860px; }
  .zap { font-size:300px; margin:60px 0 40px; }
  /* 5: 폰 목업 */
  .phone { width:640px; height:1000px; margin:0 auto; background:#FDF8F2; border-radius:76px;
           border:16px solid #3A2E22; box-shadow:0 40px 90px rgba(120,80,40,.35);
           padding:60px 44px; text-align:left; }
  .p-hero { background:linear-gradient(135deg,#F5A96B,#FBE3C6); border-radius:40px; padding:44px; }
  .p-ava { width:110px; height:110px; border-radius:50%; background:rgba(255,255,255,.8);
           display:flex; align-items:center; justify-content:center; font-size:60px; margin-bottom:20px; }
  .p-dday { font-size:88px; font-weight:800; color:#45300F; letter-spacing:-2px; }
  .p-sub { font-size:32px; font-weight:700; color:#6B4A1E; }
  .p-card { background:#fff; border-radius:30px; padding:34px; margin-top:28px;
            font-size:34px; font-weight:700; color:#362D24; box-shadow:0 8px 22px rgba(139,107,74,.1); }
  .p-card small { display:block; font-size:27px; font-weight:500; color:#8A7455; margin-top:8px; }
  /* 6: CTA */
  .pill { display:inline-block; background:#362D24; color:#fff; font-size:46px; font-weight:800;
          padding:36px 60px; border-radius:999px; margin-top:70px; }
</style>
</head>
<body>

<div class="bg" id="bg1">
  <div class="ghost">YONGDI SSAM × CLAUDE</div>
  <div class="motif"><div class="big-emoji">🌷</div></div>
</div>

<div class="bg" id="bg2">
  <div class="ghost">동생의 카톡</div>
  <div class="motif" style="top:220px">
    <div class="bub">"접종이랑 원더윅스<br>자동으로 되는 앱 없나?"</div>
    <div class="bub">"약간 육아비서 같은 거 ㅋㅋㅋ"</div>
    <div class="bub r">"오키 함 만들어볼게"</div>
  </div>
</div>

<div class="bg dark" id="bg3">
  <div class="ghost" style="color:rgba(255,220,180,.5)">AI 비서 클로드</div>
  <div class="motif" style="top:240px">
    <div class="ai-row"><div class="ai-orb"></div></div>
    <div class="ai-input">📸 캡처 1장 첨부<br>"이런 어플을 만들고 싶어"<span class="cursor"></span></div>
  </div>
</div>

<div class="bg" id="bg4">
  <div class="ghost">말할 때마다 수정 → 검증 → 배포</div>
  <div class="motif" style="top:200px">
    <div class="zap">⚡</div>
    <div class="codeline l"></div><div class="codeline"></div><div class="codeline s"></div>
    <div class="codeline"></div><div class="codeline l"></div><div class="codeline s"></div>
  </div>
</div>

<div class="bg" id="bg5">
  <div class="motif" style="top:120px">
    <div class="phone">
      <div class="p-hero">
        <div class="p-ava">👶</div>
        <div class="p-dday">D+129</div>
        <div class="p-sub">생후 18주 · 4개월</div>
      </div>
      <div class="p-card">💉 지금 접종 가능 기간<small>DTaP 2차 외 4건 · 권장일 7/1</small></div>
      <div class="p-card">🌩️ 원더윅스 4차 진행 중<small>「사건」 까꿍놀이를 이해하기 시작</small></div>
    </div>
  </div>
</div>

<div class="bg" id="bg6">
  <div class="ghost">BABYBLOOM · FREE</div>
  <div class="motif">
    <div class="big-emoji">🌷</div>
    <div class="pill">프로필 링크 · 무료 · 광고 없음</div>
  </div>
</div>

</body>
</html>
